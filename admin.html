<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Registrar Terapeuta</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    h1 {
      font-size: 1.4rem;
      color: #2d3748;
      margin-bottom: 28px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #4a5568;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      color: #2d3748;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7eb09e; }
    .service-key-field {
      background: #fffbeb;
      border-color: #f6ad55;
      font-size: 0.78rem;
      font-family: monospace;
      color: #744210;
    }
    .service-key-field:focus { border-color: #ed8936; }
    .divider {
      border: none;
      border-top: 1.5px dashed #e2e8f0;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #7eb09e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #5e9484; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }
    #mensaje {
      margin-top: 22px;
      padding: 13px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .exito { background: #c6f6d5; color: #276749; display: block !important; }
    .error { background: #fed7d7; color: #9b2c2c; display: block !important; }
    .aviso {
      font-size: 0.78rem;
      color: #92400e;
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registrar Terapeuta</h1>

    <label for="serviceKey">🔑 Service Role Key (Supabase)</label>
    <div class="aviso">⚠️ No se guarda. Pégala cada vez que uses este formulario.</div>
    <input
      type="password"
      id="serviceKey"
      class="service-key-field"
      placeholder="eyJhbGciOiJIUzI1NiIs..."
    />

    <hr class="divider"/>

    <label for="email">Email del Terapeuta</label>
    <input type="email" id="email" placeholder="terapeuta@ejemplo.com" />

    <label for="passwordTemporal">Contraseña Temporal</label>
    <input type="text" id="passwordTemporal" placeholder="Ej: Terapeuta2026!" value="Terapeuta2026!" />

    <button id="btnRegistrar" onclick="registrarTerapeuta()">Dar de Alta Terapeuta</button>

    <div id="mensaje"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ejdxiwledgsxglvhejba.supabase.co';

    function mostrar(msg, tipo) {
      const el = document.getElementById('mensaje');
      el.textContent = msg;
      el.className = tipo;
    }

    async function registrarTerapeuta() {
      const serviceKey = document.getElementById('serviceKey').value.trim();
      const email      = document.getElementById('email').value.trim();
      const password   = document.getElementById('passwordTemporal').value.trim();
      const btn        = document.getElementById('btnRegistrar');

      mostrar('', '');

      if (!serviceKey) {
        mostrar('⚠️ Pegá la Service Role Key antes de continuar.', 'error');
        return;
      }
      if (!email) {
        mostrar('⚠️ Completá el email del terapeuta.', 'error');
        return;
      }
      if (password.length < 6) {
        mostrar('⚠️ La contraseña temporal debe tener al menos 6 caracteres.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Procesando…';

      const sb = window.supabase.createClient(SUPABASE_URL, serviceKey);

      // 1. Crear el usuario directamente activo en la autenticación con la clave temporal
      const { data: authData, error: authError } = await sb.auth.admin.createUser({
        email: email,
        password: password,
        email_confirm: true // Se marca como verificado automáticamente para evitar enlaces caídos
      });

      if (authError) {
        mostrar('❌ Error al dar de alta en Auth:\n' + authError.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Dar de Alta Terapeuta';
        return;
      }

      const userId = authData?.user?.id;

      // 2. Insertar directamente en la tabla terapeutas
      const { error: dbError } = await sb
        .from('terapeutas')
        .insert([{
          id:             userId,
          email:          email,
          codigo:         'ACTIVO',
          password_plano: password
        }]);

      if (dbError) {
        mostrar(
          '⚠️ Registrado en Auth (ID: ' + userId + ') pero FALLÓ la tabla terapeutas:\n' + dbError.message,
          'error'
        );
        btn.disabled = false;
        btn.textContent = 'Dar de Alta Terapeuta';
        return;
      }

      // 3. Éxito absoluto
      document.getElementById('email').value  = '';
      mostrar('✅ ¡Terapeuta registrado con éxito total!\n\nDale esta contraseña temporal para que ingrese a cambiarla:\n🔑 ' + password, 'exito');
      btn.disabled = false;
      btn.textContent = 'Dar de Alta Terapeuta';
    }
  </script>
</body>
</html>
