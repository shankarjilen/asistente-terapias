<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Registrar Terapeuta</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    h1 {
      font-size: 1.4rem;
      color: #2d3748;
      margin-bottom: 28px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #4a5568;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      color: #2d3748;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7eb09e; }
    button {
      width: 100%;
      padding: 14px;
      background: #7eb09e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #5e9484; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }
    #mensaje {
      margin-top: 22px;
      padding: 13px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .exito  { background: #c6f6d5; color: #276749; display: block !important; }
    .error  { background: #fed7d7; color: #9b2c2c; display: block !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registrar Terapeuta</h1>

    <label for="email">Email del Terapeuta</label>
    <input type="email" id="email" placeholder="terapeuta@ejemplo.com" />

    <label for="codigo">Código / Contraseña <span style="color:#a0aec0;font-weight:400">(máx. 6 caracteres)</span></label>
    <input type="text" id="codigo" placeholder="ABC123" maxlength="6" />

    <button id="btnRegistrar" onclick="registrar()">Registrar Terapeuta</button>

    <div id="mensaje"></div>
  </div>

  <script>
    const SUPABASE_URL     = 'https://ejdxiwledgsxglvhejba.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_7wf8GsvmiqWZ5271iQJJEQ_zPPf_OiK';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function mostrar(msg, tipo) {
      const el = document.getElementById('mensaje');
      el.textContent = msg;
      el.className = tipo;
    }

    async function registrar() {
      const email  = document.getElementById('email').value.trim();
      const codigo = document.getElementById('codigo').value.trim();
      const btn    = document.getElementById('btnRegistrar');

      mostrar('', '');

      if (!email || !codigo) {
        mostrar('⚠️ Completá ambos campos antes de continuar.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Procesando…';

      // 1. Crear usuario en Auth
      const { data: authData, error: authError } = await sb.auth.signUp({
        email,
        password: codigo
      });

      if (authError) {
        mostrar('❌ Error en autenticación:\n' + authError.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Registrar Terapeuta';
        return;
      }

      const userId = authData?.user?.id;

      if (!userId) {
        mostrar('❌ No se obtuvo el ID del usuario. Verificá si el email ya existe o está pendiente de confirmación.', 'error');
        btn.disabled = false;
        btn.textContent = 'Registrar Terapeuta';
        return;
      }

      // 2. Insertar en tabla terapeutas
      const { error: dbError } = await sb
        .from('terapeutas')
        .insert([{
          id:             userId,
          email:          email,
          codigo:         codigo,
          password_plano: codigo
        }]);

      if (dbError) {
        mostrar(
          '⚠️ Usuario creado en Auth (ID: ' + userId + ') pero FALLÓ la inserción en la tabla terapeutas:\n' + dbError.message +
          '\n\nAcción requerida: revisar la tabla manualmente.',
          'error'
        );
        btn.disabled = false;
        btn.textContent = 'Registrar Terapeuta';
        return;
      }

      // 3. Éxito total
      document.getElementById('email').value  = '';
      document.getElementById('codigo').value = '';
      mostrar('✅ Terapeuta registrado correctamente.\nEmail: ' + email, 'exito');
      btn.disabled = false;
      btn.textContent = 'Registrar Terapeuta';
    }
  </script>
</body>
</html>
