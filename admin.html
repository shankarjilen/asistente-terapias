<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin - Registrar Terapeuta</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    h1 {
      font-size: 1.4rem;
      color: #2d3748;
      margin-bottom: 28px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #4a5568;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      color: #2d3748;
      margin-bottom: 20px;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #7eb09e; }
    .service-key-field {
      background: #fffbeb;
      border-color: #f6ad55;
      font-size: 0.78rem;
      font-family: monospace;
      color: #744210;
    }
    .service-key-field:focus { border-color: #ed8936; }
    .divider {
      border: none;
      border-top: 1.5px dashed #e2e8f0;
      margin-bottom: 20px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #7eb09e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      margin-bottom: 12px;
    }
    button:hover { background: #5e9484; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }
    #btnEnviarAcceso {
      background: #667eea;
      display: none;
    }
    #btnEnviarAcceso:hover { background: #5a67d8; }
    #btnEnviarAcceso:disabled { background: #a0aec0; }
    #mensaje {
      margin-top: 10px;
      padding: 13px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .exito { background: #c6f6d5; color: #276749; display: block !important; }
    .error { background: #fed7d7; color: #9b2c2c; display: block !important; }
    .aviso {
      font-size: 0.78rem;
      color: #92400e;
      background: #fefce8;
      border: 1px solid #fde68a;
      border-radius: 6px;
      padding: 8px 12px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registrar Terapeuta</h1>

    <label for="serviceKey">🔑 Service Role Key (Supabase)</label>
    <div class="aviso">⚠️ No se guarda. Pégala cada vez que uses este formulario.</div>
    <input
      type="password"
      id="serviceKey"
      class="service-key-field"
      placeholder="eyJhbGciOiJIUzI1NiIs..."
    />

    <hr class="divider"/>

    <label for="email">Email del Terapeuta</label>
    <input type="email" id="email" placeholder="terapeuta@ejemplo.com" />

    <button id="btnRegistrar" onclick="registrarTerapeuta()">Dar de Alta Terapeuta</button>
    <button id="btnEnviarAcceso" onclick="enviarMagicLink()">📨 Enviar Acceso al Terapeuta</button>

    <div id="mensaje"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ejdxiwledgsxglvhejba.supabase.co';

    // URL de tu app crear-clave.html en Netlify rama desarrollo
    const REDIRECT_URL = 'https://desarrollo--bucolic-torte-9aa5bb.netlify.app/crear-clave.html';

    let sbAdmin = null;
    let emailRegistrado = '';

    function mostrar(msg, tipo) {
      const el = document.getElementById('mensaje');
      el.textContent = msg;
      el.className = tipo;
    }

    async function registrarTerapeuta() {
      const serviceKey = document.getElementById('serviceKey').value.trim();
      const email      = document.getElementById('email').value.trim();
      const btn        = document.getElementById('btnRegistrar');

      mostrar('', '');
      document.getElementById('btnEnviarAcceso').style.display = 'none';

      if (!serviceKey) {
        mostrar('⚠️ Pegá la Service Role Key antes de continuar.', 'error');
        return;
      }
      if (!email) {
        mostrar('⚠️ Completá el email del terapeuta.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Procesando…';

      sbAdmin = window.supabase.createClient(SUPABASE_URL, serviceKey);

      // 1. Crear usuario en Auth (sin contraseña — usará magic link)
      const { data: authData, error: authError } = await sbAdmin.auth.admin.createUser({
        email: email,
        email_confirm: true
      });

      if (authError) {
        mostrar('❌ Error al dar de alta en Auth:\n' + authError.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Dar de Alta Terapeuta';
        return;
      }

      const userId = authData?.user?.id;

      // 2. Insertar en tabla terapeutas
      const { error: dbError } = await sbAdmin
        .from('terapeutas')
        .insert([{
          id:     userId,
          email:  email,
          codigo: 'PENDIENTE'
        }]);

      if (dbError) {
        mostrar(
          '⚠️ Registrado en Auth (ID: ' + userId + ') pero FALLÓ la tabla terapeutas:\n' + dbError.message,
          'error'
        );
        btn.disabled = false;
        btn.textContent = 'Dar de Alta Terapeuta';
        return;
      }

      // 3. Éxito — mostrar botón de envío
      emailRegistrado = email;
      document.getElementById('email').value = '';
      document.getElementById('btnEnviarAcceso').style.display = 'block';
      mostrar('✅ Terapeuta registrado.\nAhora podés enviarle el acceso con el botón de abajo.', 'exito');
      btn.disabled = false;
      btn.textContent = 'Dar de Alta Terapeuta';
    }

    async function enviarMagicLink() {
      const btn = document.getElementById('btnEnviarAcceso');

      if (!sbAdmin || !emailRegistrado) {
        mostrar('⚠️ Primero registrá al terapeuta.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Enviando…';

      const { error } = await sbAdmin.auth.admin.generateLink({
        type: 'magiclink',
        email: emailRegistrado,
        options: { redirectTo: REDIRECT_URL }
      });

      if (error) {
        mostrar('❌ Error al enviar el acceso:\n' + error.message, 'error');
        btn.disabled = false;
        btn.textContent = '📨 Enviar Acceso al Terapeuta';
        return;
      }

      mostrar('📨 ¡Acceso enviado a ' + emailRegistrado + '!\nEl terapeuta recibirá un enlace para crear su contraseña.', 'exito');
      btn.disabled = true;
      btn.textContent = '✅ Acceso Enviado';
      emailRegistrado = '';
    }
  </script>
</body>
</html>
