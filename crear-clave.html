<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crear Nueva Contraseña</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    h1 {
      font-size: 1.4rem;
      color: #2d3748;
      margin-bottom: 20px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #4a5568;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      color: #2d3748;
      margin-bottom: 20px;
      outline: none;
    }
    .input-wrapper {
      position: relative;
      width: 100%;
    }
    .input-wrapper input {
      padding-right: 45px;
    }
    .ojo-btn {
      position: absolute;
      right: 12px;
      top: 12px;
      background: none;
      border: none;
      color: #a0aec0;
      cursor: pointer;
      font-size: 1.1rem;
      width: auto;
      padding: 0;
    }
    .ojo-btn:hover {
      color: #4a5568;
      background: none;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #7eb09e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #5e9484; }
    button:disabled { background: #cbd5e0; cursor: not-allowed; }
    #mensaje {
      margin-top: 22px;
      padding: 13px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
    }
    .exito { background: #c6f6d5; color: #276749; display: block !important; }
    .error { background: #fed7d7; color: #9b2c2c; display: block !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Activa tu Cuenta</h1>
    <p style="font-size:0.9rem; color:#718096; margin-bottom:20px; text-align:center;">
      Ingresá el código enviado a tu correo junto con tu nueva clave de acceso.
    </p>

    <label for="correoTerapeuta">Tu Correo Electrónico</label>
    <input type="email" id="correoTerapeuta" placeholder="ejemplo@correo.com" />

    <label for="codigoVerificacion">Código de Verificación (6 dígitos)</label>
    <input type="text" id="codigoVerificacion" placeholder="000000" maxlength="6" style="text-align: center; font-weight: bold; letter-spacing: 4px;" />

    <label for="nuevaClave">Nueva Contraseña</label>
    <div class="input-wrapper">
      <input type="password" id="nuevaClave" placeholder="Mínimo 6 caracteres" />
      <button type="button" class="ojo-btn" onclick="alternarVisibilidad('nuevaClave', this)">👁️</button>
    </div>

    <label for="confirmarClave">Confirmar Contraseña</label>
    <div class="input-wrapper">
      <input type="password" id="confirmarClave" placeholder="Repetí tu contraseña" />
      <button type="button" class="ojo-btn" onclick="alternarVisibilidad('confirmarClave', this)">👁️</button>
    </div>

    <button id="btnGuardar" onclick="activarYGuardar()">Activar y Guardar Contraseña</button>

    <div id="mensaje"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ejdxiwledgsxglvhejba.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqZHhpd2xlZGdzeGdsdmhlamJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMxMzExNzMsImV4cCI6MjA1ODcxMTE3M30.13V8iunhJbU3lXn9pL5E5R3_6B7X0BqR2_wM3_6B7X0'; 

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: false }
    });

    function mostrar(msg, tipo) {
      const el = document.getElementById('mensaje');
      el.textContent = msg;
      el.className = tipo;
    }

    function alternarVisibilidad(idCampo, boton) {
      const campo = document.getElementById(idCampo);
      if (campo.type === "password") {
        campo.type = "text";
        boton.textContent = "🙈";
      } else {
        campo.type = "password";
        boton.textContent = "👁️";
      }
    }

    async function activarYGuardar() {
      const email = document.getElementById('correoTerapeuta').value.trim();
      const token = document.getElementById('codigoVerificacion').value.trim();
      const nuevaClave = document.getElementById('nuevaClave').value.trim();
      const confirmarClave = document.getElementById('confirmarClave').value.trim();
      const btn = document.getElementById('btnGuardar');

      mostrar('', '');

      if (!email || !token) {
        mostrar('⚠️ Por favor, completá tu correo y el código de 6 dígitos.', 'error');
        return;
      }
      if (token.length < 6) {
        mostrar('⚠️ El código de verificación debe tener 6 dígitos.', 'error');
        return;
      }
      if (nuevaClave.length < 6) {
        mostrar('⚠️ La contraseña debe tener al menos 6 caracteres.', 'error');
        return;
      }
      if (nuevaClave !== confirmarClave) {
        mostrar('⚠️ Las contraseñas no coinciden.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Verificando y Guardando…';

      // PASO 1: Iniciar sesión de forma segura usando el código de 6 dígitos (OTP)
      const { data: authData, error: authError } = await sb.auth.verifyOtp({
        email: email,
        token: token,
        type: 'invite'
      });

      if (authError) {
        mostrar('❌ Código incorrecto, vencido o correo no válido.', 'error');
        btn.disabled = false;
        btn.textContent = 'Activar y Guardar Contraseña';
        return;
      }

      // PASO 2: Con la sesión ya activa y segura en este instante, guardamos la contraseña
      const { error: updateError } = await sb.auth.updateUser({ password: nuevaClave });

      if (updateError) {
        mostrar('❌ Error al registrar la contraseña: ' + updateError.message, 'error');
        btn.disabled = false;
        btn.textContent = 'Activar y Guardar Contraseña';
        return;
      }

      mostrar('✅ ¡Cuenta activada y contraseña guardada con éxito! Redirigiendo...', 'exito');

      setTimeout(() => {
        window.location.href = "index.html";
      }, 2500);
    }
  </script>
</body>
</html>
