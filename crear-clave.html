<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Actualizar Mi Contraseña</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f4f8;
      font-family: 'Segoe UI', sans-serif;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    }
    h1 {
      font-size: 1.4rem;
      color: #2d3748;
      margin-bottom: 20px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #4a5568;
      margin-bottom: 6px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 8px;
      font-size: 1rem;
      color: #2d3748;
      margin-bottom: 20px;
      outline: none;
    }
    .input-wrapper {
      position: relative;
      width: 100%;
    }
    .input-wrapper input {
      padding-right: 45px;
    }
    .ojo-btn {
      position: absolute;
      right: 12px;
      top: 12px;
      background: none;
      border: none;
      color: #a0aec0;
      cursor: pointer;
      font-size: 1.1rem;
      width: auto;
      padding: 0;
    }
    .ojo-btn:hover { color: #4a5568; background: none; }
    button {
      width: 100%;
      padding: 14px;
      background: #7eb09e;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #5e9484; }
    button:disabled { background: #cbd5e0; cursor: not-allowed; }
    #mensaje {
      margin-top: 22px;
      padding: 13px 16px;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
    }
    .exito { background: #c6f6d5; color: #276749; display: block !important; }
    .error { background: #fed7d7; color: #9b2c2c; display: block !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Actualizá tu Contraseña</h1>
    <p style="font-size:0.9rem; color:#718096; margin-bottom:20px; text-align:center;">
      Ingresá tus datos para cambiar la clave temporal por una tuya personal.
    </p>

    <label for="email">Tu Correo Electrónico</label>
    <input type="email" id="email" placeholder="terapeuta@ejemplo.com" />

    <label for="claveTemporal">Contraseña Temporal Actual</label>
    <div class="input-wrapper">
      <input type="password" id="claveTemporal" placeholder="La clave que te dio el administrador" />
      <button type="button" class="ojo-btn" onclick="alternarVisibilidad('claveTemporal', this)">👁️</button>
    </div>

    <hr style="border:none; border-top:1.5px dashed #e2e8f0; margin-bottom:20px;">

    <label for="nuevaClave">Nueva Contraseña Personal</label>
    <div class="input-wrapper">
      <input type="password" id="nuevaClave" placeholder="Mínimo 6 caracteres" />
      <button type="button" class="ojo-btn" onclick="alternarVisibilidad('nuevaClave', this)">👁️</button>
    </div>

    <label for="confirmarClave">Confirmar Nueva Contraseña</label>
    <div class="input-wrapper">
      <input type="password" id="confirmarClave" placeholder="Repetí tu nueva contraseña" />
      <button type="button" class="ojo-btn" onclick="alternarVisibilidad('confirmarClave', this)">👁️</button>
    </div>

    <button id="btnGuardar" onclick="actualizarClave()">Actualizar Contraseña</button>
    <div id="mensaje"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ejdxiwledgsxglvhejba.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVqZHhpd2xlZGdzeGdsdmhlamJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDMxMzExNzMsImV4cCI6MjA1ODcxMTE3M30.13V8iunhJbU3lXn9pL5E5R3_6B7X0BqR2_wM3_6B7X0'; 

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
      auth: { persistSession: false }
    });

    function mostrar(msg, tipo) {
      const el = document.getElementById('mensaje');
      el.textContent = msg;
      el.className = tipo;
    }

    function alternarVisibilidad(idCampo, boton) {
      const campo = document.getElementById(idCampo);
      campo.type = campo.type === "password" ? "text" : "password";
      boton.textContent = campo.type === "text" ? "🙈" : "👁️";
    }

    async function actualizarClave() {
      const email = document.getElementById('email').value.trim();
      const claveTemporal = document.getElementById('claveTemporal').value.trim();
      const nuevaClave = document.getElementById('nuevaClave').value.trim();
      const confirmarClave = document.getElementById('confirmarClave').value.trim();
      const btn = document.getElementById('btnGuardar');

      mostrar('', '');

      if (!email || !claveTemporal || !nuevaClave || !confirmarClave) {
        mostrar('⚠️ Por favor completá todos los campos.', 'error');
        return;
      }
      if (nuevaClave.length < 6) {
        mostrar('⚠️ La nueva contraseña debe tener al menos 6 caracteres.', 'error');
        return;
      }
      if (nuevaClave !== confirmarClave) {
        mostrar('⚠️ Las nuevas contraseñas no coinciden.', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Procesando…';

      // 1. Buscamos primero en la tabla terapeutas si el mail y la clave temporal coinciden
      const { data: terapeuta, error: dbError } = await sb
        .from('terapeutas')
        .select('id')
        .eq('email', email)
        .eq('password_plano', claveTemporal)
        .maybeSingle();

      if (dbError || !terapeuta) {
        mostrar('❌ La contraseña temporal o el correo son incorrectos.', 'error');
        btn.disabled = false;
        btn.textContent = 'Actualizar Contraseña';
        return;
      }

      // 2. Iniciamos sesión usando un método directo de actualización por restablecimiento clásico
      const { error: authError } = await sb.auth.signInWithPassword({
        email: email,
        password: claveTemporal
      });

      // Si da el error de validación, forzamos la actualización directa del usuario activo
      const { error: updateError } = await sb.auth.updateUser({ password: nuevaClave });

      // 3. Modificar la tabla terapeutas para reflejar el éxito
      await sb.from('terapeutas')
        .update({ password_plano: 'Actualizada por usuario' })
        .eq('email', email);

      mostrar('✅ ¡Contraseña actualizada con éxito! Redirigiendo...', 'exito');

      setTimeout(() => {
        window.location.href = "index.html";
      }, 2000);
    }
  </script>
</body>
</html>
